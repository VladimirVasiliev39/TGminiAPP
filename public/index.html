<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
        button { margin: 5px; padding: 8px 12px; cursor: pointer; background: var(--tg-theme-button-color, #2e7dff); color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 5px; }
        .product-card { border: 1px solid #ccc; border-radius: 10px; margin: 10px; padding: 10px; cursor: pointer; background: var(--tg-theme-secondary-bg-color, #f9f9f9); }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--tg-theme-bg-color, #fff); border-radius: 12px; max-width: 90%; max-height: 80%; overflow: auto; padding: 20px; position: relative; }
        .close { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; }
        #debug { position: fixed; bottom: 0; left: 0; background: red; color: white; padding: 4px; font-size: 12px; }
        .categories, .brands { display: flex; flex-wrap: wrap; margin-bottom: 15px; }
        .brands button { background: #ccc; color: black; }
        .active-brand { background: #2e7dff !important; color: white !important; }
    </style>
</head>
<body>
    <div class="categories" id="categories"></div>
    <div class="brands" id="brands"></div>
    <div id="products"></div>
    <div id="modal" style="display:none;" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>
    <div id="debug">Инициализация</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let categories = [];
        let brands = [];
        let products = [];

        function debug(msg) {
            const d = document.getElementById('debug');
            d.innerText = msg;
            console.log(msg);
        }

        async function loadCategories() {
            debug('Загрузка категорий...');
            const res = await fetch('/api/categories');
            categories = await res.json();
            debug(`Категорий: ${categories.length}`);
            const container = document.getElementById('categories');
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat.name;
                btn.onclick = () => loadBrands(cat.id);
                container.appendChild(btn);
            });
        }

        async function loadBrands(categoryId) {
            debug(`Загрузка брендов для категории ${categoryId}...`);
            const res = await fetch(`/api/brands?category_id=${categoryId}`);
            brands = await res.json();
            debug(`Брендов: ${brands.length}`);
            const container = document.getElementById('brands');
            container.innerHTML = '';
            brands.forEach(b => {
                const btn = document.createElement('button');
                btn.textContent = b.name;
                btn.onclick = () => loadProducts(b.id);
                container.appendChild(btn);
            });
            document.getElementById('products').innerHTML = '';
        }

        async function loadProducts(brandId) {
            debug(`Загрузка товаров для бренда ${brandId}...`);
            const res = await fetch(`/api/products?brand_id=${brandId}`);
            products = await res.json();
            debug(`Товаров: ${products.length}`);
            renderProducts();
        }

        function renderProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `
                    <strong>${p.name}</strong>
                    ${p.image ? `<br><img src="${p.image}" style="max-width:100px; max-height:100px;">` : ''}
                    <br>${p.description || ''}
                `;
                div.onclick = () => showProduct(p);
                container.appendChild(div);
            });
        }

        // Получить варианты из полей товара
        function getVariantsFromProduct(product) {
            const variants = [];
            for (let i = 1; i <= 5; i++) {
                const unit = product[`ed_izm${i}`];
                const price = product[`cena${i}`];
                if (unit && price !== null && price !== '') {
                    variants.push({ unit, price });
                }
            }
            return variants;
        }

        function showProduct(product) {
            const variants = getVariantsFromProduct(product);
            if (variants.length === 0) {
                alert('Нет вариантов для этого товара');
                return;
            }

            let optionsHtml = '';
            variants.forEach((v, idx) => {
                optionsHtml += `<option value="${idx}">${v.unit} — ${v.price} ₽</option>`;
            });

            const modalBody = document.getElementById('modal-body');
            modalBody.innerHTML = `
                <h3>${product.name}</h3>
                ${product.image ? `<img src="${product.image}" style="max-width:100%; max-height:200px;">` : ''}
                <p>${product.description || ''}</p>
                <h4>Выберите вариант:</h4>
                <select id="variant-select">
                    ${optionsHtml}
                </select>
                <br>
                <button id="add-to-cart">Добавить в корзину</button>
            `;

            const modal = document.getElementById('modal');
            modal.style.display = 'flex';

            const closeBtn = modal.querySelector('.close');
            closeBtn.onclick = () => modal.style.display = 'none';

            const addBtn = document.getElementById('add-to-cart');
            addBtn.onclick = () => {
                const selectedIdx = parseInt(document.getElementById('variant-select').value);
                const selected = variants[selectedIdx];
                alert(`Добавлено: ${product.name} (${selected.unit}) — ${selected.price} ₽`);
                // Здесь потом будет добавление в корзину
            };
        }

        loadCategories();
    </script>
</body>
</html>
