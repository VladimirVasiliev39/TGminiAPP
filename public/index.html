<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button {
            background: var(--tg-theme-button-color, #2e7dff);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 4px;
        }
        .variant-btn {
            background: #e9ecef;
            color: #000;
            margin: 4px;
            padding: 6px 12px;
        }
        .variant-btn.active {
            background: var(--tg-theme-button-color, #2e7dff);
            color: white;
        }
        .product-card {
            border: 1px solid #ccc;
            border-radius: 12px;
            margin: 12px 0;
            padding: 12px;
            cursor: pointer;
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .product-card:hover {
            background: #e0e0e0;
        }
        .product-image {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            background: #ddd;
        }
        .product-info {
            flex: 1;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1em;
        }
        .product-brand {
            font-size: 0.9em;
            color: #666;
            margin: 4px 0;
        }
        .variant-list {
            margin: 8px 0;
            font-size: 0.85em;
            color: #444;
        }
        .variant-list div {
            margin: 2px 0;
        }
        .full-width-btn {
            width: 100%;
            margin-top: 8px;
        }
        .detail-image {
            max-width: 100%;
            max-height: 200px;
            margin: 10px 0;
        }
        .back-button {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-button span {
            font-weight: bold;
        }
        #debug {
            position: fixed;
            bottom: 0;
            left: 0;
            background: red;
            color: white;
            padding: 4px;
            font-size: 12px;
        }
        .cart-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--tg-theme-button-color, #2e7dff);
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="list-view">
            <div id="categories"></div>
            <div id="brands"></div>
            <div id="products-list"></div>
        </div>
        <div id="detail-view" style="display:none;">
            <div class="back-button" id="back-button">
                <button id="back-to-list">← Назад</button>
                <span id="back-brand-name"></span>
            </div>
            <div id="product-detail"></div>
        </div>
    </div>
    <div id="cartButton" class="cart-button">🛒<span id="cartCount" class="cart-badge">0</span></div>
    <div id="debug">Инициализация</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let categories = [];
        let brands = [];
        let products = [];
        let currentBrand = null;
        let cart = [];

        function debug(msg) {
            const d = document.getElementById('debug');
            d.innerText = msg;
            console.log(msg);
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').innerText = count;
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        async function loadCategories() {
            debug('Загрузка категорий...');
            const res = await fetch('/api/categories');
            categories = await res.json();
            debug(`Категорий: ${categories.length}`);
            const container = document.getElementById('categories');
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat.name;
                btn.onclick = () => loadBrands(cat.id);
                container.appendChild(btn);
            });
        }

        async function loadBrands(categoryId) {
            debug(`Загрузка брендов для категории ${categoryId}...`);
            const res = await fetch(`/api/brands?category_id=${categoryId}`);
            brands = await res.json();
            debug(`Брендов: ${brands.length}`);
            const container = document.getElementById('brands');
            container.innerHTML = '';
            brands.forEach(b => {
                const btn = document.createElement('button');
                btn.textContent = b.name;
                btn.onclick = () => loadProducts(b.id, b);
                container.appendChild(btn);
            });
            document.getElementById('products-list').innerHTML = '';
        }

        async function loadProducts(brandId, brand) {
            currentBrand = brand;
            debug(`Загрузка товаров для бренда ${brandId}...`);
            const res = await fetch(`/api/products?brand_id=${brandId}`);
            products = await res.json();
            debug(`Товаров: ${products.length}`);
            renderProductsList();
        }

        function getVariantsText(product) {
            let variants = [];
            for (let i=1; i<=5; i++) {
                const unit = product[`ed_izm${i}`];
                const price = product[`cena${i}`];
                if (unit && price) {
                    variants.push({ price, unit });
                }
            }
            if (variants.length === 0) return '';
            return variants.map(v => `${v.price} ₽ — ${v.unit}`).join('<br>');
        }

        function renderProductsList() {
            const container = document.getElementById('products-list');
            container.innerHTML = '';
            products.forEach(p => {
                const variantsText = getVariantsText(p);
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `
                    ${p.image ? `<img class="product-image" src="${p.image}" onerror="this.style.display='none'">` : '<div class="product-image" style="background:#ccc;"></div>'}
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-brand">${p.brand_name || '—'}</div>
                        <div class="variant-list">${variantsText}</div>
                        <button class="full-width-btn go-to-detail-btn" data-product-id="${p.id}">В корзину</button>
                    </div>
                `;
                div.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        showProductDetail(p);
                    }
                };
                const btn = div.querySelector('.go-to-detail-btn');
                btn.onclick = (e) => {
                    e.stopPropagation();
                    showProductDetail(p);
                };
                container.appendChild(div);
            });
        }

        function showProductDetail(product) {
            // Собираем варианты для детальной карточки
            const variants = [];
            for (let i=1; i<=5; i++) {
                const unit = product[`ed_izm${i}`];
                const price = product[`cena${i}`];
                if (unit && price) {
                    variants.push({ unit, price });
                }
            }
            if (variants.length === 0) {
                alert('Нет вариантов для этого товара');
                return;
            }

            let selectedVariant = variants[0];
            let currentPrice = selectedVariant.price;

            const container = document.getElementById('product-detail');
            let variantButtonsHtml = '';
            variants.forEach((v, idx) => {
                variantButtonsHtml += `<button class="variant-btn" data-price="${v.price}" data-unit="${v.unit}" data-idx="${idx}">${v.unit}</button>`;
            });

            container.innerHTML = `
                <h2>${product.name}</h2>
                ${product.image ? `<img class="detail-image" src="${product.image}" onerror="this.style.display='none'">` : ''}
                <div><strong>Цена:</strong> <span id="current-price">${currentPrice}</span> ₽</div>
                <div><strong>Бренд:</strong> ${product.brand_name || '—'}</div>
                <div><strong>Фасовка:</strong> <span id="selected-unit">${selectedVariant.unit}</span></div>
                <div class="variant-buttons">${variantButtonsHtml}</div>
                <div><strong>Категория:</strong> ${product.category_name || '—'}</div>
                <div><strong>Описание:</strong> ${product.description || '—'}</div>
                <button id="add-to-cart-btn">В корзину</button>
            `;

            document.querySelectorAll('.variant-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const price = parseInt(btn.dataset.price);
                    const unit = btn.dataset.unit;
                    document.getElementById('current-price').innerText = price;
                    document.getElementById('selected-unit').innerText = unit;
                    selectedVariant = { unit, price };
                });
            });
            document.querySelector('.variant-btn')?.classList.add('active');

            const addBtn = document.getElementById('add-to-cart-btn');
            addBtn.onclick = () => {
                alert(`Добавлено: ${product.name} (${selectedVariant.unit}) — ${selectedVariant.price} ₽`);
                // здесь будет добавление в корзину
            };

            const backBrandSpan = document.getElementById('back-brand-name');
            backBrandSpan.innerText = currentBrand ? `к ${currentBrand.name}` : '';
            document.getElementById('back-to-list').onclick = backToList;

            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
        }

        function backToList() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
        }

        document.getElementById('cartButton').onclick = () => {
            alert(`В корзине ${cart.length} товаров (пока не реализовано)`);
        };

        loadCategories();
    </script>
</body>
</html>
