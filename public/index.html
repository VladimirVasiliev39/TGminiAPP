<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; text-align: center; padding: 20px; }
        button { padding: 12px 24px; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🛍 Добро пожаловать в магазин!</h1>
    <p>Товары появятся здесь совсем скоро.</p>

    <button id="buyBtn">Тестовая кнопка</button>
    <button id="testFetch">📡 Тест fetch</button> //Тестовая кнопка

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        document.getElementById('buyBtn').onclick = () => {
        tg.sendData('Тестовый заказ');
        tg.close();           
        };
        
//============= Обработчик  тест-кнопки==================
document.getElementById('testFetch').onclick = async () => {
    try {
        const res = await fetch('/api/test', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ from: 'phone', time: Date.now() })
        });
        const data = await res.json();
        alert('Fetch работает: ' + JSON.stringify(data));
    } catch (err) {
        alert('Ошибка fetch: ' + err.message);
    }
};

       };*/

    </script>
</body>
</html>
