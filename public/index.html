<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        button {
            background: var(--tg-theme-button-color, #2e7dff);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 4px;
        }
        .product-card {
            border: 1px solid #ccc;
            border-radius: 12px;
            margin: 12px 0;
            padding: 12px;
            cursor: pointer;
            background: var(--tg-theme-secondary-bg-color, #f9f9f9);
        }
        .product-card:hover {
            background: #e0e0e0;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.2em;
        }
        .product-image {
            max-width: 100%;
            max-height: 200px;
            margin: 10px 0;
        }
        .variant-list {
            margin: 10px 0;
            padding-left: 20px;
        }
        select, .variant-select {
            margin: 10px 0;
            padding: 8px;
            width: 100%;
            max-width: 300px;
        }
        .back-button {
            margin-bottom: 20px;
        }
        #debug {
            position: fixed;
            bottom: 0;
            left: 0;
            background: red;
            color: white;
            padding: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="list-view">
            <div id="categories"></div>
            <div id="brands"></div>
            <div id="products-list"></div>
        </div>
        <div id="detail-view" style="display:none;">
            <button id="back-to-list" class="back-button">← Назад к списку</button>
            <div id="product-detail"></div>
        </div>
    </div>
    <div id="debug">Инициализация</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let categories = [];
        let brands = [];
        let products = [];

        function debug(msg) {
            const d = document.getElementById('debug');
            d.innerText = msg;
            console.log(msg);
        }

        // Загрузка категорий
        async function loadCategories() {
            debug('Загрузка категорий...');
            const res = await fetch('/api/categories');
            categories = await res.json();
            debug(`Категорий: ${categories.length}`);
            const container = document.getElementById('categories');
            container.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat.name;
                btn.onclick = () => loadBrands(cat.id);
                container.appendChild(btn);
            });
        }

        // Загрузка брендов по категории
        async function loadBrands(categoryId) {
            debug(`Загрузка брендов для категории ${categoryId}...`);
            const res = await fetch(`/api/brands?category_id=${categoryId}`);
            brands = await res.json();
            debug(`Брендов: ${brands.length}`);
            const container = document.getElementById('brands');
            container.innerHTML = '';
            brands.forEach(b => {
                const btn = document.createElement('button');
                btn.textContent = b.name;
                btn.onclick = () => loadProducts(b.id);
                container.appendChild(btn);
            });
            // Очищаем товары при смене категории
            document.getElementById('products-list').innerHTML = '';
        }

        // Загрузка товаров по бренду
        async function loadProducts(brandId) {
            debug(`Загрузка товаров для бренда ${brandId}...`);
            const res = await fetch(`/api/products?brand_id=${brandId}`);
            products = await res.json();
            debug(`Товаров: ${products.length}`);
            renderProductsList();
        }

        function renderProductsList() {
            const container = document.getElementById('products-list');
            container.innerHTML = '';
            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                // первая цена для превью
                let firstPrice = '';
                for (let i=1; i<=5; i++) {
                    if (p[`ed_izm${i}`] && p[`cena${i}`]) {
                        firstPrice = `${p[`ed_izm${i}`]} — ${p[`cena${i}`]} ₽`;
                        break;
                    }
                }
                div.innerHTML = `
                    <div class="product-name">${p.name}</div>
                    ${p.image ? `<img class="product-image" src="${p.image}" onerror="this.style.display='none'">` : ''}
                    <div>${p.description || ''}</div>
                    <div>${firstPrice || 'Цена не указана'}</div>
                `;
                div.onclick = () => showProductDetail(p);
                container.appendChild(div);
            });
        }

        function showProductDetail(product) {
            // Собираем варианты
            const variants = [];
            for (let i=1; i<=5; i++) {
                const unit = product[`ed_izm${i}`];
                const price = product[`cena${i}`];
                if (unit && price) {
                    variants.push({ unit, price });
                }
            }
            if (variants.length === 0) {
                alert('Нет вариантов для этого товара');
                return;
            }

            // Отображаем детальную карточку
            const container = document.getElementById('product-detail');
            let optionsHtml = '';
            variants.forEach((v, idx) => {
                optionsHtml += `<option value="${idx}">${v.unit} — ${v.price} ₽</option>`;
            });

            container.innerHTML = `
                <h2>${product.name}</h2>
                ${product.image ? `<img class="product-image" src="${product.image}" onerror="this.style.display='none'">` : ''}
                <p>${product.description || ''}</p>
                <h4>Варианты:</h4>
                <ul class="variant-list">
                    ${variants.map(v => `<li>${v.unit} — ${v.price} ₽</li>`).join('')}
                </ul>
                <select id="variant-select">
                    ${optionsHtml}
                </select>
                <br>
                <button id="add-to-cart-btn">Добавить в корзину</button>
            `;

            // Скрываем список, показываем деталь
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';

            // Обработчик кнопки "Добавить в корзину"
            const addBtn = document.getElementById('add-to-cart-btn');
            addBtn.onclick = () => {
                const selectedIdx = parseInt(document.getElementById('variant-select').value);
                const selected = variants[selectedIdx];
                alert(`Добавлено: ${product.name} (${selected.unit}) — ${selected.price} ₽`);
                // Позже здесь будет реальное добавление в корзину
            };
        }

        function backToList() {
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('list-view').style.display = 'block';
        }

        document.getElementById('back-to-list').onclick = backToList;

        loadCategories();
    </script>
</body>
</html>
