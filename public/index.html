<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Витрина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стили остаются без изменений, как в предыдущей версии */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            overflow-y: auto;
            padding-bottom: 70px;
        }
        .banner {
            width: 100%;
            display: block;
            background: #f0f0f0;
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .menu-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            font-size: 18px;
            font-weight: 500;
            border-bottom: 1px solid var(--tg-theme-hint-color, #eee);
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--tg-theme-button-color, #2e7dff);
        }
        .grid-scroll {
            overflow-x: auto;
            white-space: nowrap;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            scrollbar-width: thin;
        }
        .grid-scroll::-webkit-scrollbar {
            height: 4px;
        }
        .tile {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 12px 8px;
            min-width: 80px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .tile:active {
            transform: scale(0.96);
        }
        .tile-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 12px;
            background: #ddd;
            margin-bottom: 8px;
        }
        .tile-name {
            font-size: 14px;
            text-align: center;
            white-space: normal;
            word-break: break-word;
        }
        .products-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .product-card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .product-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #ddd;
        }
        .product-info {
            padding: 12px;
            text-align: center;
        }
        .product-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        .product-brand {
            font-size: 0.85rem;
            color: var(--tg-theme-hint-color, #666);
            margin-bottom: 8px;
        }
        .variant-list {
            font-size: 0.8rem;
            color: var(--tg-theme-hint-color, #444);
            margin: 8px 0;
            text-align: left;
            display: inline-block;
        }
        .variant-list div {
            margin: 2px 0;
        }
        .full-width-btn {
            width: 100%;
            background: var(--tg-theme-button-color, #2e7dff);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 8px;
            cursor: pointer;
        }
        .cart-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--tg-theme-button-color, #2e7dff);
            color: white;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: opacity 0.2s;
            z-index: 10;
        }
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, white);
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 20;
        }
        .cart-modal.open {
            transform: translateY(0);
        }
        .close-cart {
            background: none;
            border: none;
            font-size: 24px;
            float: right;
            cursor: pointer;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .cart-total {
            font-weight: bold;
            margin-top: 10px;
            text-align: right;
        }
        .hidden {
            display: none;
        }
        .variant-btn {
            background: var(--tg-theme-secondary-bg-color, #e9ecef);
            border: none;
            padding: 8px 12px;
            margin: 4px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .variant-btn.active {
            background: var(--tg-theme-button-color, #2e7dff);
            color: white;
        }
    </style>
</head>
<body>
    <div class="banner">
        <img id="bannerImage" class="banner-img" src="/Images/vitrina/vitrina.jpg" alt="Витрина" onerror="this.style.display='none'">
    </div>

    <div class="menu-header">
        <div id="backButtonContainer" class="hidden">
            <button id="backBtn" class="back-btn">← <span id="backText"></span></button>
        </div>
        <span id="menuTitle">Главное меню</span>
    </div>

    <div id="categoriesContainer" class="grid-scroll"></div>
    <div id="brandsContainer" class="grid-scroll hidden"></div>
    <div id="productsContainer" class="products-list"></div>

    <div id="cartButton" class="cart-button hidden">🛒<span id="cartCount" class="cart-badge">0</span></div>

    <div id="cartModal" class="cart-modal">
        <button class="close-cart" id="closeCart">✕</button>
        <h3>Корзина</h3>
        <div id="cartItems"></div>
        <div class="cart-total" id="cartTotal"></div>
        <button id="checkoutBtn" style="width:100%; margin-top: 15px; padding:12px; background:#2e7dff; color:white; border:none; border-radius:10px;">Оформить заказ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let categories = [];
        let brands = [];
        let products = [];
        let currentBrand = null;
        let currentCategoryId = null;
        let cart = [];
        
        // Сохраняем исходное фото витрины
        const defaultBanner = '/Images/vitrina/vitrina.jpg';
        const bannerImg = document.getElementById('bannerImage');

        function setBanner(imageUrl) {
            if (imageUrl && imageUrl !== '') {
                bannerImg.src = imageUrl;
                bannerImg.style.display = 'block';
            } else {
                bannerImg.src = defaultBanner;
            }
        }

        const categoriesContainer = document.getElementById('categoriesContainer');
        const brandsContainer = document.getElementById('brandsContainer');
        const productsContainer = document.getElementById('productsContainer');
        const menuTitle = document.getElementById('menuTitle');
        const backButtonContainer = document.getElementById('backButtonContainer');
        const backBtn = document.getElementById('backBtn');
        const backTextSpan = document.getElementById('backText');
        const cartButton = document.getElementById('cartButton');
        const cartCountSpan = document.getElementById('cartCount');
        const cartModal = document.getElementById('cartModal');
        const closeCartBtn = document.getElementById('closeCart');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const cartItemsDiv = document.getElementById('cartItems');
        const cartTotalSpan = document.getElementById('cartTotal');

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCountSpan.innerText = count;
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCartModal();
            if (cart.length > 0) {
                cartButton.classList.remove('hidden');
            } else {
                cartButton.classList.add('hidden');
            }
        }

        function renderCartModal() {
            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<p>Корзина пуста</p>';
                cartTotalSpan.innerText = '';
                return;
            }
            let html = '';
            let total = 0;
            cart.forEach((item, idx) => {
                total += item.price * item.quantity;
                html += `
                    <div class="cart-item">
                        <div><strong>${item.productName}</strong> (${item.variantName})<br>x${item.quantity}</div>
                        <div>${item.price * item.quantity} ₽ <button data-idx="${idx}" class="remove-item">❌</button></div>
                    </div>
                `;
            });
            cartItemsDiv.innerHTML = html;
            cartTotalSpan.innerText = `Итого: ${total} ₽`;
            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    cart.splice(idx, 1);
                    updateCartUI();
                });
            });
        }

        async function loadCategories() {
            const res = await fetch('/api/categories');
            categories = await res.json();
            categoriesContainer.innerHTML = '';
            categories.forEach(cat => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.onclick = () => onCategorySelect(cat.id, cat.icon);
                tile.innerHTML = `
                    <img class="tile-image" src="${cat.icon || '/Images/placeholder.png'}" onerror="this.src='/Images/placeholder.png'">
                    <div class="tile-name">${cat.name}</div>
                `;
                categoriesContainer.appendChild(tile);
            });
            categoriesContainer.classList.remove('hidden');
            brandsContainer.classList.add('hidden');
            productsContainer.innerHTML = '';
            menuTitle.innerText = 'Главное меню';
            backButtonContainer.classList.add('hidden');
            currentBrand = null;
            currentCategoryId = null;
            // Возвращаем общую витрину
            setBanner(defaultBanner);
        }

        async function onCategorySelect(categoryId, categoryIcon) {
            currentCategoryId = categoryId;
            // Меняем витрину на фото категории (если есть)
            if (categoryIcon) {
                setBanner(categoryIcon);
            } else {
                setBanner(defaultBanner);
            }
            
            const res = await fetch(`/api/brands?category_id=${categoryId}`);
            brands = await res.json();
            brandsContainer.innerHTML = '';
            brands.forEach(b => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.onclick = () => onBrandSelect(b.id, b.name);
                tile.innerHTML = `
                    <img class="tile-image" src="${b.logo || '/Images/placeholder.png'}" onerror="this.src='/Images/placeholder.png'">
                    <div class="tile-name">${b.name}</div>
                `;
                brandsContainer.appendChild(tile);
            });
            categoriesContainer.classList.add('hidden');
            brandsContainer.classList.remove('hidden');
            productsContainer.innerHTML = '';
            menuTitle.innerText = ''; // при брендах заголовок пустой
            backButtonContainer.classList.remove('hidden');
            backTextSpan.innerText = 'Главное меню';
            backBtn.onclick = () => loadCategories(); // возврат к категориям (и к общей витрине)
        }

        async function onBrandSelect(brandId, brandName) {
            currentBrand = brandName;
            const res = await fetch(`/api/products?brand_id=${brandId}`);
            products = await res.json();
            renderProductsList();
            brandsContainer.classList.add('hidden');
            menuTitle.innerText = ''; // заголовок справа пустой
            backButtonContainer.classList.remove('hidden');
            backTextSpan.innerText = brandName; // только имя бренда без "Назад"
            backBtn.onclick = () => loadBrandsFromCurrentCategory();
        }

        async function loadBrandsFromCurrentCategory() {
            if (!currentCategoryId) {
                loadCategories();
                return;
            }
            // При возврате к брендам возвращаем витрину категории (или общую, если нет иконки)
            const currentCategory = categories.find(c => c.id === currentCategoryId);
            if (currentCategory && currentCategory.icon) {
                setBanner(currentCategory.icon);
            } else {
                setBanner(defaultBanner);
            }
            
            const res = await fetch(`/api/brands?category_id=${currentCategoryId}`);
            brands = await res.json();
            brandsContainer.innerHTML = '';
            brands.forEach(b => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.onclick = () => onBrandSelect(b.id, b.name);
                tile.innerHTML = `
                    <img class="tile-image" src="${b.logo || '/Images/placeholder.png'}" onerror="this.src='/Images/placeholder.png'">
                    <div class="tile-name">${b.name}</div>
                `;
                brandsContainer.appendChild(tile);
            });
            productsContainer.innerHTML = '';
            categoriesContainer.classList.add('hidden');
            brandsContainer.classList.remove('hidden');
            menuTitle.innerText = '';
            backButtonContainer.classList.remove('hidden');
            backTextSpan.innerText = 'Главное меню';
            backBtn.onclick = () => loadCategories();
        }

        function getVariantsText(product) {
            let variants = [];
            for (let i=1; i<=5; i++) {
                const unit = product[`ed_izm${i}`];
                const price = product[`cena${i}`];
                if (unit && price) {
                    variants.push({ price, unit });
                }
            }
            if (variants.length === 0) return '';
            return variants.map(v => `${v.price} ₽ — ${v.unit}`).join('<br>');
        }

        function renderProductsList() {
            productsContainer.innerHTML = '';
            products.forEach(p => {
                const variantsText = getVariantsText(p);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    ${p.image ? `<img class="product-image" src="${p.image}" onerror="this.style.display='none'">` : '<div class="product-image" style="background:#ccc;"></div>'}
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-brand">${p.brand_name || '—'}</div>
                        <div class="variant-list">${variantsText}</div>
                        <button class="full-width-btn go-to-detail-btn" data-product-id="${p.id}">В корзину</button>
                    </div>
                `;
                card.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        showProductDetail(p);
                    }
                };
                const btn = card.querySelector('.go-to-detail-btn');
                btn.onclick = (e) => {
                    e.stopPropagation();
                    showProductDetail(p);
                };
                productsContainer.appendChild(card);
            });
        }

        function showProductDetail(product) {
            const variants = [];
            for (let i=1; i<=5; i++) {
                const unit = product[`ed_izm${i}`];
                const price = product[`cena${i}`];
                if (unit && price) {
                    variants.push({ unit, price });
                }
            }
            if (variants.length === 0) {
                alert('Нет вариантов для этого товара');
                return;
            }
            let selectedVariant = variants[0];
            let currentPrice = selectedVariant.price;

            const modalBody = document.createElement('div');
            modalBody.style.position = 'fixed';
            modalBody.style.top = '0';
            modalBody.style.left = '0';
            modalBody.style.right = '0';
            modalBody.style.bottom = '0';
            modalBody.style.background = 'rgba(0,0,0,0.5)';
            modalBody.style.display = 'flex';
            modalBody.style.alignItems = 'center';
            modalBody.style.justifyContent = 'center';
            modalBody.style.zIndex = '2000';

            const modalContent = document.createElement('div');
            modalContent.style.background = 'var(--tg-theme-bg-color, #fff)';
            modalContent.style.borderRadius = '12px';
            modalContent.style.maxWidth = '90%';
            modalContent.style.maxHeight = '80%';
            modalContent.style.overflow = 'auto';
            modalContent.style.padding = '20px';
            modalContent.style.position = 'relative';

            let variantButtonsHtml = '';
            variants.forEach((v, idx) => {
                variantButtonsHtml += `<button class="variant-btn" data-price="${v.price}" data-unit="${v.unit}" data-idx="${idx}">${v.unit}</button>`;
            });

            modalContent.innerHTML = `
                <h2>${product.name}</h2>
                ${product.image ? `<img src="${product.image}" style="max-width:100%; max-height:200px; margin:10px 0;">` : ''}
                <div><strong>Цена:</strong> <span id="detail-price">${currentPrice}</span> ₽</div>
                <div><strong>Бренд:</strong> ${product.brand_name || '—'}</div>
                <div><strong>Фасовка:</strong> <span id="detail-unit">${selectedVariant.unit}</span></div>
                <div class="variant-buttons">${variantButtonsHtml}</div>
                <div><strong>Категория:</strong> ${product.category_name || '—'}</div>
                <div><strong>Описание:</strong> ${product.description || '—'}</div>
                <button id="modal-add-to-cart" style="margin-top:16px; padding:10px; background:var(--tg-theme-button-color); color:white; border:none; border-radius:8px; width:100%;">Добавить в корзину</button>
                <button id="modal-close" style="margin-top:8px; background:none; border:none; text-decoration:underline;">Закрыть</button>
            `;

            modalBody.appendChild(modalContent);
            document.body.appendChild(modalBody);

            modalContent.querySelectorAll('.variant-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    modalContent.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const price = parseInt(btn.dataset.price);
                    const unit = btn.dataset.unit;
                    modalContent.querySelector('#detail-price').innerText = price;
                    modalContent.querySelector('#detail-unit').innerText = unit;
                    selectedVariant = { unit, price };
                });
            });
            const firstBtn = modalContent.querySelector('.variant-btn');
            if (firstBtn) firstBtn.classList.add('active');

            const addBtn = modalContent.querySelector('#modal-add-to-cart');
            addBtn.onclick = () => {
                const existingIndex = cart.findIndex(i => i.productId === product.id && i.variantName === selectedVariant.unit);
                if (existingIndex !== -1) {
                    cart[existingIndex].quantity++;
                } else {
                    cart.push({
                        productId: product.id,
                        productName: product.name,
                        variantName: selectedVariant.unit,
                        price: selectedVariant.price,
                        quantity: 1
                    });
                }
                updateCartUI();
                alert(`Добавлено: ${product.name} (${selectedVariant.unit}) — ${selectedVariant.price} ₽`);
                modalBody.remove();
            };

            const closeBtn = modalContent.querySelector('#modal-close');
            closeBtn.onclick = () => modalBody.remove();
        }

        cartButton.onclick = () => {
            renderCartModal();
            cartModal.classList.add('open');
        };
        closeCartBtn.onclick = () => cartModal.classList.remove('open');

        checkoutBtn.onclick = async () => {
            if (cart.length === 0) {
                alert('Корзина пуста');
                return;
            }
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const userId = tg.initDataUnsafe?.user?.id || 0;
            const orderData = { user_id: userId, items: cart, total };
            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });
                const result = await res.json();
                if (result.success) {
                    await fetch('/api/send-message', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chatId: userId, text: `✅ Заказ №${result.orderId} оформлен на сумму ${total} ₽. Спасибо!` })
                    });
                    alert(`Заказ №${result.orderId} оформлен!`);
                    cart = [];
                    updateCartUI();
                    cartModal.classList.remove('open');
                } else {
                    alert('Ошибка оформления заказа');
                }
            } catch (err) {
                alert('Сетевая ошибка');
                console.error(err);
            }
        };

        loadCategories();
    </script>
</body>
</html>
